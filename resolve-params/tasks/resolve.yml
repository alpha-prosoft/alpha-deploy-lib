- name: Resolve stack outputs
  shell: |
    import json, boto3
    from botocore.exceptions import ClientError

    STACKS = [
        "{{ params['EnvironmentNameUpper'] }}-{{ item.type }}-{{ item.name }}-stack",
        "{{ params['EnvironmentNameUpper'] }}-{{ item.type }}-alpha-{{ item.name }}-stack",
    ]
    REGION = "{{ item.region | default(params['Region']) }}"

    cf = boto3.client("cloudformation", region_name=REGION)

    def get_outputs(name):
        try:
            stack = cf.describe_stacks(StackName=name)["Stacks"][0]
            return {o["OutputKey"]: o["OutputValue"] for o in stack.get("Outputs", [])}
        except ClientError:
            return None

    for stack_name in STACKS:
        outputs = get_outputs(stack_name)
        if outputs is not None:
            break
    else:
        stack_name = STACKS[-1]
        outputs = {}

    print(json.dumps({"used_stack": stack_name, "outputs": outputs}))
  args:
    executable: /usr/bin/python3
  environment: '{{ params }}'
  register: _stack_script

- name: Set resolved stack outputs
  set_fact:
    _stack_result: '{{ _stack_script.stdout | from_json }}'
    params: '{{ params | combine((_stack_script.stdout | from_json).outputs) }}'

- debug:
    msg: 'Resolved {{ item.type }}:{{ item.name }} from stack {{ _stack_result.used_stack }} — {{ _stack_result.outputs | length }} outputs'
